name: Weekly Template Check

on:
  schedule:
    - cron: "17 4 * * 2"
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - run: pnpm install

      - run: pnpm tsx scripts/verify-templates.ts
